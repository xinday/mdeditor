<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mdeditor</title>
  </head>
  <body>
    <div id="app">
      <header id="toolbar">
        <button id="btn-new" type="button">新建</button>
        <button id="btn-open" type="button">開啟</button>
        <button id="btn-save" type="button">存檔</button>
        <button id="btn-saveas" type="button">另存為</button>
        <div id="export-menu">
          <button id="btn-export" type="button" aria-haspopup="true" aria-expanded="false">匯出 ▾</button>
          <ul id="export-list" hidden>
            <li><button type="button" data-export="html">HTML</button></li>
            <li><button type="button" data-export="print">列印 / PDF</button></li>
          </ul>
        </div>
        <span id="status"></span>
      </header>
      <main id="panes">
        <div id="editor"></div>
        <div id="preview" class="markdown-body"></div>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
