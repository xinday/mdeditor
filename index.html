<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mdeditor</title>
    <!-- Inline SVG favicon (data URI): no extra file/request, works on Pages,
         Tauri and the single-file build, and stops the /favicon.ico 404. -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%230969da'/><rect x='16' y='13' width='32' height='38' rx='4' fill='%23fff'/><rect x='22' y='22' width='20' height='3.5' rx='1.75' fill='%230969da'/><rect x='22' y='30' width='20' height='3.5' rx='1.75' fill='%230969da'/><rect x='22' y='38' width='12' height='3.5' rx='1.75' fill='%230969da'/></svg>" />
  </head>
  <body>
    <div id="app">
      <header id="toolbar">
        <button id="btn-new" type="button">新建</button>
        <button id="btn-open" type="button">開啟</button>
        <button id="btn-save" type="button">存檔</button>
        <button id="btn-saveas" type="button">另存為</button>
        <div id="export-menu">
          <button id="btn-export" type="button" aria-haspopup="true" aria-expanded="false">匯出 ▾</button>
          <ul id="export-list" hidden>
            <li><button type="button" data-export="html">HTML</button></li>
            <li><button type="button" data-export="print">列印 / PDF</button></li>
          </ul>
        </div>
        <span id="status"></span>
      </header>
      <main id="panes">
        <div id="editor"></div>
        <div id="preview" class="markdown-body"></div>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
