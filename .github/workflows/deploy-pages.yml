# 推到 master 時自動建置並部署 web 版到 GitHub Pages。
# 啟用方式：repo Settings → Pages → Build and deployment → Source 選「GitHub Actions」。
name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# Pages 部署所需權限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時間只跑一個部署；新推送會取代進行中的舊部署
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build   # 產出靜態 dist/（base 為相對路徑，子路徑可用）

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
